<div class="mention-dialog__header">
  <ul class="tab-btn-list">
    <li class="tab-btn-list__item" [class.active]="activeTabIndex === idx"
        *ngFor="let item of MENTION_TABS; index as idx" (mousedown)="onTabChange(idx)">
      <span>{{ item.label }}</span>
    </li>
  </ul>
</div>
<div class="mention-dialog__content">
  <ng-container *ngIf="!list.length">
    <nz-empty nzNotFoundImage="simple"></nz-empty>
  </ng-container>

  <ng-container *ngFor="let item of list; index as idx">
    <div class="mention-dialog__content__item"
         [class.active]="idx === selectIndex" (mousedown)="onItemClick($event, item)">
      <ng-container *ngTemplateOutlet="template || simpleTpl; context: { $implicit: item, item, type: activeTabIndex === 0  ? 'user' : 'doc'}"></ng-container>
    </div>
  </ng-container>
</div>
<div class="mention-dialog__footer">
  <div class="mention-dialog__footer__button" (click)="onSure()">确定</div>
</div>

<ng-template #simpleTpl let-item let-type='type'>
  {{ item.name + type }}
</ng-template>
