<div class="bf-float-toolbar__container" #container>
  <ng-container *ngFor="let menu of toolbarMenuList">
    <div class="line" *ngIf="menu.name=='|' else item"></div>
    <ng-template #item>
      <div class="bf-float-toolbar__item" [attr.data-name]="menu.name" [style.--color]="menu.name === 'mark' ? menu.value : ''"
           [title]="menu.intro" (mousedown)="onMousedown($event, menu)"
           (mouseenter)="onMouseEnter($event, menu)"
           (mouseleave)="onMouseLeave($event, menu)">
        <i [class]="['bf_icon', menu.icon]"></i>
        <i class="bf_icon bf_xiajaintou dropdown" *ngIf="menu.children"></i>
      </div>
    </ng-template>
  </ng-container>
</div>

<ng-template #alignTpl let-style>
  <div class="bf-float-toolbar__align__container bf-float-toolbar__children" [style]="style">
    <div class="bf-float-toolbar__children__gap"></div>
    <div class="bf-float-toolbar__align bf-float-toolbar__children__container">
      <div class="bf-float-toolbar__align__item" *ngFor="let item of alignList.children" [title]="item.intro"
           (mousedown)="alignList.value = item.value; alignList.icon = item.icon; onMousedown($event, item)">
        <i [class]="['bf_icon', item.icon]"></i>
      </div>
    </div>
    <div class="bf-float-toolbar__children__gap"></div>
  </div>
</ng-template>

<ng-template #markTpl let-style>
  <div class="bf-float-toolbar__mark__container bf-float-toolbar__children" [style]="style">
    <div class="bf-float-toolbar__children__gap"></div>
    <div class="bf-float-toolbar__mark bf-float-toolbar__children__container" style="padding: 8px">
<!--      <p class="bf-float-toolbar__mark__title">字体颜色</p>-->
<!--      <div class="bf-float-toolbar__mark__list" style="margin-bottom: 8px">-->
<!--        <span class="bf-float-toolbar__mark__list__item" *ngFor="let item of markList.children"-->
<!--             [class.active]="item.value === markList.value"-->
<!--             (mousedown)="markList.value = item.value" [style.color]="item.value"-->
<!--            style="border: 1px solid #eee;">-->
<!--          A-->
<!--        </span>-->
<!--      </div>-->
      <p class="bf-float-toolbar__mark__title">高亮颜色</p>
      <div class="bf-float-toolbar__mark__list">
        <span class="bf-float-toolbar__mark__list__item"
             [class.active]="!markList.value" style="border: 1px solid #eee; background: linear-gradient(-45deg, transparent 49%, black 50%, transparent 51%);"
             (mousedown)="$event.preventDefault(); markList.value = null">
        </span>
        <span class="bf-float-toolbar__mark__list__item" *ngFor="let item of markList.children"
             [class.active]="item.value === markList.value" [style.background-color]="item.value"
             (mousedown)="$event.preventDefault(); markList.value = item.value" >
        </span>
      </div>
    </div>
    <div class="bf-float-toolbar__children__gap"></div>
  </div>
</ng-template>
