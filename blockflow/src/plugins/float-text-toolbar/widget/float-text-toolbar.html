<div class="float-text-toolbar__container" #container>
  <ng-container *ngFor="let menu of toolbarMenuList">
    <div class="line" *ngIf="menu.name=='|' else item"></div>
    <ng-template #item>
      <div class="float-text-toolbar__item" [attr.data-name]="menu.name" [style.--color]="menu.name === 'mark' ? menu.value : ''"
           [title]="menu.intro" (mousedown)="onMousedown($event, menu)"
           (mouseenter)="onMouseEnter($event, menu)"
           (mouseleave)="onMouseLeave($event, menu)">
        <i [class]="['editor', menu.icon]"></i>
        <i class="editor editor-drop_down dropdown" *ngIf="menu.children"></i>
      </div>
    </ng-template>
  </ng-container>
</div>

<ng-template #alignTpl let-left='left' let-top='top'>
  <div class="float-text-toolbar__align__container float-text-toolbar__children"
       [style.left.px]="left" [style.top.px]="top">
    <div class="float-text-toolbar__children__gap"></div>
    <div class="float-text-toolbar__align float-text-toolbar__children__container">
      <div class="float-text-toolbar__align__item" *ngFor="let item of alignList.children" [title]="item.intro"
           (mousedown)="alignList.value = item.value; alignList.icon = item.icon; onMousedown($event, item)">
        <i [class]="['editor', item.icon]"></i>
      </div>
    </div>
    <div class="float-text-toolbar__children__gap"></div>
  </div>
</ng-template>

<ng-template #markTpl let-left='left' let-top='top'>
  <div class="float-text-toolbar__mark__container float-text-toolbar__children" [style.left.px]="left"
       [style.top.px]="top">
    <div class="float-text-toolbar__children__gap"></div>
    <div class="float-text-toolbar__mark float-text-toolbar__children__container" style="padding: 8px">
      <p class="float-text-toolbar__mark__title">高亮颜色</p>
      <div class="float-text-toolbar__mark__list">
        <div class="float-text-toolbar__mark__list__item" *ngFor="let item of markList.children"
             [class.active]="item.value === markList.value"
             (mousedown)="markList.value = item.value" [style.background-color]="item.value">
        </div>
      </div>
    </div>
    <div class="float-text-toolbar__children__gap"></div>
  </div>
</ng-template>
