<nz-tabset [nzSelectedIndex]="activeTabIndex" (nzSelectedIndexChange)="onTabChange($event)" (mousedown)="$event.preventDefault()">
  <nz-tab nzTitle="人员" (mousedown)="$event.preventDefault()">
    <ng-container *ngTemplateOutlet="content"></ng-container>
  </nz-tab>
  <nz-tab nzTitle="文档" (mousedown)="$event.preventDefault()">
    <ng-container *ngTemplateOutlet="content"></ng-container>
  </nz-tab>
</nz-tabset>

<ng-template #content>
  <ng-container *ngIf="!list.length">
    <nz-empty nzNotFoundImage="simple"></nz-empty>
  </ng-container>

  <ng-container *ngFor="let item of list; index as idx">
    <div class="mention-dialog__content__item"
         [class.active]="idx === selectIndex" (mouseenter)="selectIndex = idx"
         (mousedown)="onItemClick($event, item)">
      <ng-container *ngTemplateOutlet="template || simpleTpl; context: { $implicit: item, item, type: activeTabIndex === 0  ? 'user' : 'doc'}"></ng-container>
      <ng-template #simpleTpl let-item let-type='type'>
        {{ item.name + type }}
      </ng-template>
    </div>
  </ng-container>
</ng-template>
